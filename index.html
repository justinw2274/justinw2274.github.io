<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starbucks Store Locations Visualization</title>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://d3-annotation.susielu.com/d3-annotation.min.js"></script>
    <style>
        .annotation {
            font-size: 12px;
            fill: #555;
        }
        .bar {
            fill: steelblue;
        }
        .point {
            fill: steelblue;
        }
        #controls {
            margin: 20px;
        }
        #controls button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Starbucks Store Locations Visualization</h1>
    <div id="visualization"></div>
    <div id="controls">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
